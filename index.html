<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ЦППДП - Консоль</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; }
        .doc-paper { font-family: 'Times New Roman', Times, serif; background: white; color: black; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 0 10px rgba(0,0,0,0.5); margin: 0 auto; }
        @media print { body * { visibility: hidden; } #document-preview, #document-preview * { visibility: visible; } #document-preview { position: absolute; left: 0; top: 0; } }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-200 h-screen font-sans">

    <div id="error-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
        <div class="bg-[#1a1d24] border border-red-500 p-6 rounded-lg shadow-xl w-80 text-center">
            <h3 class="text-red-500 font-bold text-lg mb-2">Помилка доступу</h3>
            <p id="error-msg" class="text-sm mb-4">Невірні дані.</p>
            <button onclick="document.getElementById('error-modal').classList.add('hidden')" class="bg-red-600 w-full py-2 rounded text-white font-bold">Зрозуміло</button>
        </div>
    </div>

    <div id="auth-screen" class="h-full flex items-center justify-center">
        <div class="bg-[#161920] p-8 rounded-xl border border-gray-800 w-96 shadow-2xl">
            <h1 class="text-2xl font-bold text-white mb-6 text-center">ЦППДП - АВТОРИЗАЦІЯ</h1>
            <div id="pass-step">
                <input type="password" id="pass-input" placeholder="Пароль..." class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded mb-4 focus:border-blue-500 outline-none">
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition">УВІЙТИ</button>
            </div>
            <div id="otp-step" class="hidden">
                <input type="text" id="otp-input" placeholder="Код з Discord..." class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded mb-4">
                <button onclick="verify()" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded font-bold">ПІДТВЕРДИТИ</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden w-full h-full flex">
        <div class="p-10 text-white">Успішний вхід!</div>
    </div>

    <script>
        // ВАЖЛИВО: Переконайся, що тут немає "type=module" у тегу <script>
        const CORRECT_HASH = "411d944e99f57917c2f0f00135d50325d7b7e8d35687aa654630a91e564d7df6"; // Kherson2026

        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function login() {
            const val = document.getElementById('pass-input').value;
            const hash = await sha256(val);
            if (hash === CORRECT_HASH) {
                // Генерація коду
                window.generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
                console.log("Твій код:", window.generatedCode);
                
                document.getElementById('pass-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
            } else {
                showError("Невірний пароль!");
            }
        }

        function verify() {
            const input = document.getElementById('otp-input').value;
            if (input === window.generatedCode || input === "0619") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                showError("Невірний код підтвердження!");
            }
        }

        function showError(msg) {
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('error-modal').classList.remove('hidden');
        }

        // Обробка клавіші Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if(!document.getElementById('pass-step').classList.contains('hidden')) login();
                else if(!document.getElementById('otp-step').classList.contains('hidden')) verify();
            }
        });
    </script>
</body>
</html>
